<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوابة المواطن - صندوق مساعدة الناس</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .login-card {
            background-color: #ffffff;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(12, 57, 43, 0.08);
            width: 100%;
            max-width: 420px;
            padding: 25px;
            border: 1px solid rgba(12, 57, 43, 0.05);
        }

        .header-section {
            text-align: center;
            margin-bottom: 25px;
        }

        .header-section h2 {
            color: #0c392b;
            margin: 0 0 8px 0;
            font-size: 22px;
            font-weight: 700;
        }

        .header-section p {
            color: #666;
            font-size: 14px;
            margin: 0;
        }

        .alert-validation {
            background-color: #fff3cd;
            border-right: 4px solid #ffc107;
            color: #856404;
            padding: 12px;
            border-radius: 6px;
            font-size: 13px;
            line-height: 1.5;
            margin-bottom: 20px;
            display: none;
        }

        .tabs-container {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            border-bottom: 2px solid #e2e8f0;
            padding-bottom: 10px;
        }

        .tab-btn {
            flex: 1;
            background: none;
            border: none;
            padding: 10px;
            font-size: 14px;
            font-weight: 600;
            color: #718096;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .tab-btn.active {
            color: #0c392b;
            border-bottom: 3px solid #3bb393;
        }

        .form-group {
            margin-bottom: 18px;
            text-align: right;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #4a5568;
            margin-bottom: 6px;
        }

        .form-control {
            width: 100%;
            padding: 12px;
            border: 1px solid #cbd5e0;
            border-radius: 8px;
            font-size: 15px;
            box-sizing: border-box;
            transition: border-color 0.3s ease;
            text-align: right;
        }

        .form-control:focus {
            outline: none;
            border-color: #3bb393;
        }

        .otp-inputs {
            display: flex;
            gap: 10px;
            justify-content: center;
            direction: ltr;
            margin-top: 8px;
        }

        .otp-box {
            width: 45px;
            height: 45px;
            text-align: center;
            font-size: 20px;
            font-weight: bold;
            border: 1px solid #cbd5e0;
            border-radius: 8px;
        }

        .otp-box:focus {
            border-color: #3bb393;
            outline: none;
        }

        .btn-submit {
            width: 100%;
            background-color: #0c392b;
            color: #ffffff;
            border: none;
            padding: 14px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.3s ease;
            margin-top: 10px;
        }

        .btn-submit:hover {
            background-color: #165240;
        }

        .form-content {
            display: none;
        }

        .form-content.active {
            display: block;
        }

        .file-input-wrapper {
            position: relative;
            margin-top: 5px;
        }
    </style>
</head>
<body>

<div class="login-card">
    <div class="header-section">
        <h2>بوابة المواطن الرقمية</h2>
        <p>صندوق مساعدة الناس - بيت حانون</p>
    </div>

    <div class="alert-validation" id="validationAlert">
        <strong>تنويه:</strong> رقم الهوية هذا مسجل بالفعل كفرد تابع ضمن عائلة (أحمد محمد حانون).. لا يمكن إعادة التسجيل كرب أسرة مستقل إلا في حالة تحديث الحالة الاجتماعية.
    </div>

    <div class="tabs-container">
        <button class="tab-btn active" onclick="switchTab('login-tab')">تسجيل الدخول (OTP)</button>
        <button class="tab-btn" onclick="switchTab('split-tab')">طلب انفصال للزواج</button>
    </div>

    <div id="login-tab" class="form-content active">
        <div class="form-group">
            <label>رقم الهوية الوطنية</label>
            <input type="text" class="form-control" placeholder="أدخل 9 أرقام" maxlength="9">
        </div>

        <div class="form-group">
            <label>رقم الجوال (المسجل في النظام)</label>
            <input type="text" class="form-control" placeholder="059xxxxxxx">
        </div>

        <div class="form-group">
            <label>رمز التحقق الثنائي (OTP)</label>
            <p style="font-size: 11px; color: #718096; margin: 0 0 5px 0;">سيصلك كود مؤقت عبر رسالة نصية أو واتساب</p>
            <div class="otp-inputs">
                <input type="text" class="otp-box" maxlength="1">
                <input type="text" class="otp-box" maxlength="1">
                <input type="text" class="otp-box" maxlength="1">
                <input type="text" class="otp-box" maxlength="1">
            </div>
        </div>

        <button class="btn-submit" onclick="showDemoAlert()">تأكيد الدخول</button>
    </div>

    <div id="split-tab" class="form-content">
        <div class="form-group">
            <label>رقم الهوية الشخصية (للزوج)</label>
            <input type="text" class="form-control" placeholder="أدخل رقم الهوية">
        </div>

        <div class="form-group">
            <label>تاريخ عقد الزواج الجديد</label>
            <input type="date" class="form-control">
        </div>

        <div class="form-group">
            <label>إرفاق صورة عقد الزواج (رسمي ومصدق)</label>
            <div class="file-input-wrapper">
                <input type="file" class="form-control" accept="image/*,.pdf">
            </div>
        </div>

        <button class="btn-submit">تقديم طلب الانفصال وتأسيس عائلة</button>
    </div>

    <div style="text-align: center; margin-top: 20px;">
        <a href="index.html" style="color: #718096; font-size: 13px; text-decoration: none; font-weight: 600;"> رجوع ←</a>
    </div>
</div>

<script>
    function switchTab(tabId) {
        document.querySelectorAll('.form-content').forEach(content => {
            content.classList.remove('active');
        });
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.classList.remove('active');
        });

        document.getElementById(tabId).classList.add('active');
        event.currentTarget.classList.add('active');
    }

    function showDemoAlert() {
        document.getElementById('validationAlert').style.display = 'block';
    }
</script>

</body>
  </html>
